name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: docker/build-push-action@v5
        with:
          push: 'true'
          tags: 'ghcr.io/jenkinsci/github-plugin:latest'

      - name: Build
        run: mvn clean package -DskipTests