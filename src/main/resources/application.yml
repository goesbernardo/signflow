clicksign:
  api:
    url: https://sandbox.clicksign.com/api/v3
    token: e6acc96a-bfba-40fc-8248-62727f4f632e

server:
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    disable-swagger-default-url: true

swagger:
  server-url: ${SWAGGER_SERVER_URL:}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/signflow
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect