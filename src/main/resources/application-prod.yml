# ================================================================
# SignFlow — application-prod.yml
# Ativado com: SPRING_PROFILES_ACTIVE=prod
# ================================================================

server:
  port: ${SERVER_PORT:8081}

signflow:
  encryption:
    key: ${SIGNFLOW_ENCRYPTION_KEY}
  providers:
    clicksign:
      enabled: true
      base-url: ${CLICKSIGN_URL}
      token: ${CLICKSIGN_API_TOKEN}
      webhook-secret: ${CLICKSIGN_WEBHOOK_SECRET}

spring:
  datasource:
    url: postgresql://signflow-db:5432/signflow
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-on-validation-error: false
    clean-disabled: true

  kafka:
    listener:
      auto-startup: false
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      properties:
        sasl.mechanism: PLAIN
        security.protocol: SASL_SSL
        sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username='${KAFKA_API_KEY}' password='${KAFKA_API_SECRET}';
    consumer:
      properties:
        sasl.mechanism: PLAIN
        security.protocol: SASL_SSL
        sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username='${KAFKA_API_KEY}' password='${KAFKA_API_SECRET}';

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ── Swagger habilitado em produção com acesso controlado ─────────
# Acesse: https://signflow-lysg.onrender.com/swagger-ui.html
# JSON:   https://signflow-lysg.onrender.com/api-docs
springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    disable-swagger-default-url: true
    # Configurações de UX do Swagger UI
    display-request-duration: true
    filter: true
    show-extensions: true
    try-it-out-enabled: true
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /api-docs

swagger:
  server-url: ${SWAGGER_SERVER_URL:https://signflow-lysg.onrender.com}

logging:
  pattern:
    level: "%5p [requestId=%X{requestId}] [userId=%X{userId}]"
  level:
    root: INFO
    com.signflow: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN