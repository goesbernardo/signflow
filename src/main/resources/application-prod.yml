# ================================================================
# SignFlow — application-prod.yml
# Ativado com: SPRING_PROFILES_ACTIVE=prod
# Todas as variáveis sem fallback são OBRIGATÓRIAS via docker-compose.prod.yml
# ================================================================

server:
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: framework

signflow:
  encryption:
    key: ${SIGNFLOW_ENCRYPTION_KEY}
  default-provider: ${SIGNFLOW_DEFAULT_PROVIDER:CLICKSIGN}
  providers:
    clicksign:
      enabled: true
      base-url: ${CLICKSIGN_URL:https://sandbox.clicksign.com/api/v3}
      token: ${CLICKSIGN_API_TOKEN}
      webhook-secret: ${CLICKSIGN_WEBHOOK_SECRET}
    docusign:
      enabled: ${DOCUSIGN_ENABLED:false}
      base-url: ${DOCUSIGN_BASE_URL}
      access-token: ${DOCUSIGN_ACCESS_TOKEN:}
      webhook-secret: ${DOCUSIGN_WEBHOOK_SECRET}
      integration-key: ${DOCUSIGN_INTEGRATION_KEY:}
      secret-key: ${DOCUSIGN_SECRET_KEY:}
      user-id: ${DOCUSIGN_USER_ID:}
      account-id: ${DOCUSIGN_ACCOUNT_ID:}
      keypair-id: ${DOCUSIGN_KEYPAIR_ID:}
      auth-server: ${DOCUSIGN_AUTH_SERVER:https://account.docusign.com}
      private-key: ${DOCUSIGN_PRIVATE_KEY:}

spring:
  datasource:
    # CORRIGIDO: adicionado prefixo jdbc: que estava faltando
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://signflow-db:5432/signflow}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-on-validation-error: false
    clean-disabled: true

  mail:
    # ADICIONADO: configuração de e-mail que estava ausente no prod
    host: ${SPRING_MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${SPRING_MAIL_PORT:2525}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  kafka:
    listener:
      # CORRIGIDO: auto-startup true em prod para processar webhooks
      auto-startup: true
    # CORRIGIDO: usa Kafka local do EC2 sem SASL (docker interno)
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: signflow-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.signflow.*"

resilience4j:
  circuitbreaker:
    instances:
      clicksign-circuit-breaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  ratelimiter:
    instances:
      userRateLimiter:
        limitForPeriod: 10
        limitRefreshPeriod: 1m
        timeoutDuration: 0
        registerHealthIndicator: true
      ipRateLimiter:
        limitForPeriod: 10
        limitRefreshPeriod: 1m
        timeoutDuration: 0
        registerHealthIndicator: true
      loginRateLimiter:
        limitForPeriod: 5
        limitRefreshPeriod: 1m
        timeoutDuration: 0
        registerHealthIndicator: true
    rate-limiter-aspect-order: 0

security:
  jwt:
    # OBRIGATÓRIO em prod — sem fallback
    secret: ${JWT_SECRET}
    expiration: 900000        # 15 minutos
    refresh-expiration: 604800000  # 7 dias
  admin:
    # ALINHADO com docker-compose.prod.yml
    username: ${SIGNFLOW_ADMIN_USERNAME}
    password: ${SIGNFLOW_ADMIN_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

# Swagger habilitado em prod com acesso controlado
springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    disable-swagger-default-url: true
    display-request-duration: true
    filter: true
    show-extensions: true
    try-it-out-enabled: true
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /api-docs

swagger:
  server-url: ${SWAGGER_SERVER_URL:https://signflow.api.br}

logging:
  pattern:
    level: "%5p [requestId=%X{requestId}] [userId=%X{userId}]"
  level:
    root: INFO
    com.signflow: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.apache.kafka: ERROR