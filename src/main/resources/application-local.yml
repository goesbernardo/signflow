signflow:
  encryption:
    # Fallback apenas para desenvolvimento local.
    key: ${SIGNFLOW_ENCRYPTION_KEY:dev-encryption-key-32-chars-long}
  default-provider: ${SIGNFLOW_DEFAULT_PROVIDER:CLICKSIGN}
  providers:
    clicksign:
      enabled: true
      base-url: ${CLICKSIGN_URL:https://sandbox.clicksign.com/api/v3}
      token: ${CLICKSIGN_API_TOKEN:43e5624f-84fa-4c72-b3c7-03202c34f8c6}
      webhook-secret: ${CLICKSIGN_WEBHOOK_SECRET:webhook-secret}
    docusign:
      enabled: ${DOCUSIGN_ENABLED:false}
      base-url: ${DOCUSIGN_BASE_URL:https://demo.docusign.net/restapi/v2.1/accounts/${DOCUSIGN_ACCOUNT_ID:demo-account-id}}
      access-token: ${DOCUSIGN_ACCESS_TOKEN:demo-access-token}
      webhook-secret: ${DOCUSIGN_WEBHOOK_SECRET:docusign-webhook-secret}

server:
  forward-headers-strategy: framework
  port: ${SERVER_PORT:8081}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    disable-swagger-default-url: true
    display-request-duration: true
    filter: true
    try-it-out-enabled: true

swagger:
  server-url: ${SWAGGER_SERVER_URL:http://localhost:8081}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/signflow}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-on-validation-error: false
    clean-disabled: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${SPRING_MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${SPRING_MAIL_PORT:2525}
    username: ${SPRING_MAIL_USERNAME:3530f56e286f40}
    password: ${SPRING_MAIL_PASSWORD:d2f0bd913cb1b5}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  kafka:
    # Em local o listener pode ficar desligado se não quiser usar Kafka
    listener:
      auto-startup: false
    # Variável alinhada com o docker-compose.local.yml (SPRING_KAFKA_BOOTSTRAP_SERVERS)
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: signflow-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.signflow.*"

resilience4j:
  circuitbreaker:
    instances:
      clicksign-circuit-breaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      docusign-circuit-breaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  ratelimiter:
    instances:
      userRateLimiter:
        limitForPeriod: 10
        limitRefreshPeriod: 1m
        timeoutDuration: 0
        registerHealthIndicator: true
      ipRateLimiter:
        limitForPeriod: 10
        limitRefreshPeriod: 1m
        timeoutDuration: 0
        registerHealthIndicator: true
      loginRateLimiter:
        limitForPeriod: 5
        limitRefreshPeriod: 1m
        timeoutDuration: 0
        registerHealthIndicator: true
    rate-limiter-aspect-order: 0

security:
  jwt:
    # Fallback para dev — em prod JWT_SECRET é obrigatório sem fallback
    secret: ${JWT_SECRET:43e5624f-84fa-4c72-b3c7-03202c34f8c6-dev-secret-key-extended}
    expiration: 900000        # 15 minutos
    refresh-expiration: 604800000  # 7 dias
  admin:
    # Alinhado com docker-compose.local.yml — SIGNFLOW_ADMIN_USERNAME e SIGNFLOW_ADMIN_PASSWORD
    username: ${SIGNFLOW_ADMIN_USERNAME:admin}
    password: ${SIGNFLOW_ADMIN_PASSWORD:Admin@Signflow2026}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  pattern:
    level: "%5p [requestId=%X{requestId}] [userId=%X{userId}]"
  level:
    root: INFO
    com.signflow: DEBUG
    org.hibernate.SQL: WARN
    org.apache.kafka: ERROR